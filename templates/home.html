<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predict — Markwise</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <header class="header">
    <a href="{{ url_for('index') }}" class="logo">Markwise</a>
    <a href="{{ url_for('index') }}" class="header-link">Home</a>
  </header>

  <main class="predict">
    <h1>Maths score predictor</h1>
    <p class="subtitle">Fill in all fields below.</p>

    <form id="predictForm" class="form" method="post" action="{{ url_for('predict_datapoint') }}" novalidate>

      <label for="gender">Gender</label>
      <select id="gender" name="gender" required>
        <option value="" disabled selected>Select</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>

      <label for="ethnicity">Race / ethnicity</label>
      <select id="ethnicity" name="ethnicity" required>
        <option value="" disabled selected>Select</option>
        <option value="group A">Group A</option>
        <option value="group B">Group B</option>
        <option value="group C">Group C</option>
        <option value="group D">Group D</option>
        <option value="group E">Group E</option>
      </select>

      <label for="parental_level_of_education">Parental education</label>
      <select id="parental_level_of_education" name="parental_level_of_education" required>
        <option value="" disabled selected>Select</option>
        <option value="associate's degree">Associate's degree</option>
        <option value="bachelor's degree">Bachelor's degree</option>
        <option value="high school">High school</option>
        <option value="master's degree">Master's degree</option>
        <option value="some college">Some college</option>
        <option value="some high school">Some high school</option>
      </select>

      <label for="lunch">Lunch type</label>
      <select id="lunch" name="lunch" required>
        <option value="" disabled selected>Select</option>
        <option value="free/reduced">Free / reduced</option>
        <option value="standard">Standard</option>
      </select>

      <label for="test_preparation_course">Test preparation</label>
      <select id="test_preparation_course" name="test_preparation_course" required>
        <option value="" disabled selected>Select</option>
        <option value="none">None</option>
        <option value="completed">Completed</option>
      </select>

      <div class="row">
        <div class="col">
          <label for="reading_score">Reading score</label>
          <input id="reading_score" name="reading_score" type="number" min="0" max="100" placeholder="0–100" required />
        </div>
        <div class="col">
          <label for="writing_score">Writing score</label>
          <input id="writing_score" name="writing_score" type="number" min="0" max="100" placeholder="0–100" required />
        </div>
      </div>

      <button type="submit" class="btn btn-full" id="submitBtn">Predict score</button>
    </form>

    {% if results is defined and results is not none %}
    <div class="result" id="resultBox">
      <p class="result-label">Predicted maths score</p>
      <p class="result-score">{{ '%.1f' | format(results | float) }}</p>
    </div>
    {% endif %}
  </main>

  {% include 'footer.html' %}

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
